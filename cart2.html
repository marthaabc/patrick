<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <style>
        body {
            font-family: Arial;
            background: #e8f5e9;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
        }

        .cart-item {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>My Cart 🛒</h1>

<div id="cart-items"></div>

<h2 id="total"></h2>

<a href="index.html">⬅ Back to Shop</a>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");
let total = 0;

// SHOW ITEMS
function displayCart() {
    container.innerHTML = "";
    total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        container.innerHTML += `
            <div class="cart-item">
                ${item.name} - ${item.price} RWF
                <button onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: " + total + " RWF";
}

// REMOVE ITEM
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

// RUN
displayCart();

</script>

</body>
</html>
