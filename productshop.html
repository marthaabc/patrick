<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RW-Rulindo Agro Market</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef5ee;
}

/* NAVBAR */
.top-nav {
  background:#1b5e20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

.top-nav a {
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-weight:bold;
}

.top-nav a:hover {
  color:#c8e6c9;
}

/* HEADER */
.main-header {
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 20px;
}

/* SEARCH + CART */
.top-controls {
  margin-top: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  position: relative;
}

.search-bar {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

.cart-btn {
  background: #66bb6a;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* CART */
.cart-dropdown {
  position: absolute;
  top: 50px;
  right: 0;
  width: 260px;
  background: white;
  color: black;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  display: none;
  padding: 15px;
}

.cart-dropdown.active {
  display: block;
}

/* PRODUCTS */
.container {
  padding: 20px;
}

h2 {
  text-align:center;
  color:#2e7d32;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.product {
  background: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
}

.product img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.product button {
  background:#2e7d32;
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}

/* FOOTER */
footer {
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">

  <!-- LEFT (BACK BUTTON) -->
  <a href="index.html">⬅ Home</a>

  <!-- RIGHT MENUS -->
  <div>
    <a href="index.html">Home</a>
    <a href="login2.html">Login</a>
    <a href="productshop.html">product</a>
    <a href="service.html">service</a>
     <a href="checkautform.html">checkaut</a>
  </div>

</div>

<!-- HEADER -->
<header class="main-header">
  <h1>RW-Rulindo Agro Market</h1>

  <div class="top-controls">
    <input type="text" class="search-bar" placeholder="Find product..." onkeyup="searchProduct()">
    <button class="cart-btn" onclick="toggleCart()">🛒 Cart</button>

    <div class="cart-dropdown" id="cartMenu">
      <h3>Your Cart</h3>
      <div id="cartItems"></div>
      <div id="total"></div>
    </div>
  </div>
</header>

<!-- PRODUCTS -->
<div class="container">
  <h2>Our Products</h2>

  <div class="products">

    <div class="product">
      <img src="14.jfif">
      <h3>Potatoes</h3>
      <p>500 RWF/kg</p>
      <button onclick="addToCart('Potatoes',500)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="2.jfif">
      <h3>Tomatoes</h3>
      <p>800 RWF/kg</p>
      <button onclick="addToCart('Tomatoes',800)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="3.jfif">
      <h3>Bananas</h3>
      <p>300 RWF/kg</p>
      <button onclick="addToCart('Bananas',300)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="4.jfif">
      <h3>Maize</h3>
      <p>400 RWF/kg</p>
      <button onclick="addToCart('Maize',400)">Add to Cart</button>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Email: info@agromarket.rw</p>
  <p>Phone: +250 788 123 456</p>
  <p>© 2026 RW-Rulindo Agro Market</p>
</footer>

<script>
function searchProduct() {
  let input = document.querySelector(".search-bar").value.toLowerCase();
  let products = document.querySelectorAll(".product");

  products.forEach(product => {
    let name = product.querySelector("h3").innerText.toLowerCase();
    product.style.display = name.includes(input) ? "block" : "none";
  });
}

function toggleCart() {
  document.getElementById("cartMenu").classList.toggle("active");
  displayCart();
}

function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

function displayCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let cartItems = document.getElementById("cartItems");
  let total = 0;

  cartItems.innerHTML = "";

  if(cart.length === 0){
    cartItems.innerHTML = "<p>No items in cart</p>";
  }

  cart.forEach((item,index)=>{
    total += item.price;
    cartItems.innerHTML += `
      <div>
        ${item.name} - ${item.price} RWF
        <button onclick="removeItem(${index})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: " + total + " RWF";
}
</script>

</body>
</html>
