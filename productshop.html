<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RW Agro Shop</title>

<style>
body{
  font-family:Arial;
  background:#eef5ee;
  margin:0;
}

header{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
}

.addBox{
  background:#c8e6c9;
  padding:20px;
  text-align:center;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  background:#1b5e20;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.product{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>RW Agro Market Shop 🛒</h1>
</header>

<!-- ADD PRODUCT -->
<div class="addBox">
<h2>Add Product</h2>

<input type="text" id="pname" placeholder="Name">
<input type="number" id="pprice" placeholder="Price">
<input type="text" id="pimage" placeholder="Image">

<br>
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<script>

/* ================= DEFAULT PRODUCTS ================= */
if(!localStorage.getItem("products")){
localStorage.setItem("products", JSON.stringify([
{name:"Potatoes",price:500,image:"14.jfif"},
{name:"Tomatoes",price:800,image:"2.jfif"},
{name:"Bananas",price:300,image:"3.jfif"},
{name:"Maize",price:400,image:"4.jfif"},
{name:"Beans",price:900,image:"5.jfif"},
{name:"Avocado",price:700,image:"6.jfif"},
{name:"Onion",price:300,image:"7.jfif"},
{name:"Carrots",price:200,image:"8.jfif"},
{name:"Vegetables",price:1000,image:"9.jfif"},
{name:"Pineapple",price:400,image:"10.jfif"},
{name:"Lemon",price:300,image:"11.jfif"},
{name:"Pepper",price:250,image:"12.jfif"},
{name:"Mushroom",price:700,image:"13.jfif"},
{name:"Potatoes Big",price:1200,image:"14.jfif"},
{name:"Peanuts",price:400,image:"15.jfif"},
{name:"Cassava Leaves",price:600,image:"16.jfif"},
{name:"Milk",price:400,image:"17.jfif"},
{name:"Meat",price:3000,image:"18.jfif"},
{name:"Mangoes",price:400,image:"19.jfif"},
{name:"Eggs",price:200,image:"20.jfif"}
]));
}

/* ================= SHOW PRODUCTS ================= */
function showProducts(){
let products = JSON.parse(localStorage.getItem("products"));
let box = document.getElementById("productList");

box.innerHTML = "";

products.forEach(p=>{
box.innerHTML += `
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.price} RWF</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>
`;
});
}

/* ================= ADD PRODUCT ================= */
function addProduct(){

let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;
let image = document.getElementById("pimage").value;

if(name==""||price==""||image==""){
alert("Fill all fields");
return;
}

let products = JSON.parse(localStorage.getItem("products"));

products.push({name,price,image});

localStorage.setItem("products", JSON.stringify(products));

showProducts();

document.getElementById("pname").value="";
document.getElementById("pprice").value="";
document.getElementById("pimage").value="";
}

/* ================= CART ================= */
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push({name,price});
localStorage.setItem("cart", JSON.stringify(cart));
alert(name+" added to cart!");
}

/* LOAD */
showProducts();

</script>

</body>
</html>
