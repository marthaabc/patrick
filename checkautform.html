<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order System</title>

<style>
body{
    font-family: Arial;
    background:#eaf7ea;
    margin:0;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
    background:#1b5e20;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* NAV */
nav{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
}

/* MAIN CENTER */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    flex:1;
    padding:20px;
}

/* BOXES */
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:100%;
    max-width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select, button{
    width:100%;
    padding:10px;
    margin:6px 0;
    box-sizing:border-box;
}

/* BUTTON */
button{
    background:#1b5e20;
    color:white;
    border:none;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:#1b5e20;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    nav{
        width:100%;
        justify-content:center;
    }

    footer{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }
}
</style>

</head>

<body>

<!-- HEADER -->
<header>

<h1 style="margin:0; font-size:20px;">
RW-Rulindo Agro Market
</h1>

<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
<a href="productshop.html">Shop</a>
<a href="service.html">Service</a>
<a href="checkautform.html">Checkout</a>

<span>🔍</span>
<span>🛒</span>
<span>👤</span>
</nav>

</header>

<!-- BACK BUTTON -->
<div style="padding:15px;">
<a href="index.html" 
style="padding:10px 20px; background:#2e7d32; color:white; text-decoration:none; border-radius:5px;">
⬅ Back to Home
</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- LOGIN BOX -->
<div id="loginBox" class="box">

<h2 style="text-align:center; color:#1b5e20;">Login</h2>

<input id="username" type="text" placeholder="Enter Name">

<button onclick="login()">Login</button>

</div>

<!-- ORDER BOX -->
<div id="orderBox" class="box" style="display:none;">

<h2 style="text-align:center; color:#1b5e20;">Order Form</h2>

<input type="text" placeholder="Customer Name">
<input type="tel" placeholder="Phone Number">
<input type="text" placeholder="Delivery Address">
<input type="date">

<select>
<option>Select Payment Method</option>
<option>Cash</option>
<option>Mobile Money</option>
<option>Card</option>
</select>

<button onclick="submitOrder()">Submit</button>

<button onclick="logout()" style="background:red; margin-top:10px;">
Logout
</button>

</div>

</div>

<!-- FOOTER -->
<footer>

<div>
<h3 style="margin:0;">RW-Rulindo Agro Market</h3>
<p style="margin:5px 0; font-size:13px;">
Trusted agricultural marketplace
</p>
</div>

<div style="display:flex; gap:15px; flex-wrap:wrap;">
<p>Email: info@agromarket.rw</p>
<p>Tel: +250 735 907 160</p>
<p>© 2026 All Rights Reserved</p>
</div>

</footer>

<script>
// LOGIN
function login() {
  let name = document.getElementById("username").value;

  if(name === "") {
    alert("Please enter your name");
  } else {
    localStorage.setItem("user", name);
    showOrder();
  }
}

// SHOW ORDER
function showOrder() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("orderBox").style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// SUBMIT ORDER
function submitOrder() {
  alert("Order submitted successfully!");
}

// AUTO LOGIN
if(localStorage.getItem("user")){
  showOrder();
}
</script>

</body>
</html>
