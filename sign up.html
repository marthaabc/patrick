<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RW-Rulindo Agro Market</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

/* BODY */
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
transition:0.3s;
color:#222;
}

/* DARK MODE */
body.dark{
background:#111;
color:white;
}

body.dark .container{
background:#222;
color:white;
}

body.dark input,
body.dark textarea{
background:#333;
color:white;
border:1px solid #555;
}

body.dark header{
background:linear-gradient(90deg,#000,#222);
}

body.dark footer{
background:#000;
}

/* HEADER */
header{
background:linear-gradient(90deg,#1b5e20,#2e7d32);
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
color:white;
position:sticky;
top:0;
z-index:999;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
height:60px;
border-radius:50%;
background:white;
padding:5px;
object-fit:cover;
}

#logoTitle{
font-size:30px;
}

#logoDesc{
font-size:14px;
color:#d7d7d7;
}

/* NAVIGATION */
nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#c8e6c9;
}

/* RIGHT CONTROLS */
.right-controls{
display:flex;
align-items:center;
gap:10px;
}

#languageSwitcher{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* BUTTONS */
.dark-btn{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
}

button{
width:100%;
padding:14px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:darkgreen;
}

/* FORM */
.container{
width:90%;
max-width:500px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

.container h3{
margin-bottom:20px;
color:#1b5e20;
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,
textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
outline:none;
transition:0.3s;
}

input:focus,
textarea:focus{
border-color:#2e7d32;
box-shadow:0 0 5px rgba(46,125,50,0.3);
}

/* FOOTER */
footer{
background:#1b5e20;
color:white;
padding:30px 15px;
margin-top:40px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.footer-grid a{
color:white;
text-decoration:none;
display:block;
margin:5px 0;
}

.footer-grid a:hover{
text-decoration:underline;
}

/* SOCIAL */
.social{
display:flex;
gap:10px;
margin-top:10px;
}

.social a{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,0.2);
color:white;
text-decoration:none;
transition:0.3s;
}

.social a:hover{
background:white;
color:#1b5e20;
}

/* MOBILE */
@media(max-width:768px){

header{
flex-direction:column;
text-align:center;
gap:15px;
}

nav{
justify-content:center;
}

.right-controls{
justify-content:center;
}

#logoTitle{
font-size:24px;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">

<img src="ange.png" alt="logo">

<div>

<h1 id="logoTitle">
RW-Rulindo Agro Market
</h1>

<p id="logoDesc">
Welcome to agricultural market
</p>

</div>

</div>

<!-- NAV -->
<nav>

<a id="navHome" href="index.html">Home</a>

<a id="navLogin" href="login2.html">
Login
</a>

<a id="navSignup" href="sign up.html">
Sign Up
</a>

<a id="navShop" href="productshop.html">
Shop
</a>

<a id="navServices" href="service.html">
Services
</a>

<a id="navOrders" href="checkautform.html">
Orders
</a>

<a id="navContact" href="contact.html">
Contact
</a>

</nav>

<!-- RIGHT -->
<div class="right-controls">

<select id="languageSwitcher"
onchange="changeLanguage()">

<option value="en">
ENGLISH
</option>

<option value="rw">
KINYARWANDA
</option>

<option value="fr">
FRANÇAIS
</option>

</select>

<button class="dark-btn"
onclick="toggleMode()">

<i class="fa-solid fa-moon"></i>

</button>

</div>

</header>

<!-- FORM -->
<div class="container">

<h3>
🌾 Register Farmer
</h3>

<label>
Farmer Name
</label>

<input type="text"
id="name"
placeholder="Farmer Name">

<label>
Location
</label>

<input type="text"
id="location"
placeholder="Location">

<label>
Farmer Description
</label>

<textarea id="bio"
rows="5"
placeholder="Farmer Description"></textarea>

<br><br>

<button onclick="submitData()">
Submit
</button>

</div>

<!-- SCRIPT -->
<script>

/* DARK MODE */

function toggleMode(){

document.body.classList.toggle("dark");

let icon =
document.querySelector(".dark-btn i");

if(document.body.classList.contains("dark")){

icon.classList.remove("fa-moon");
icon.classList.add("fa-sun");

localStorage.setItem(
"theme",
"dark"
);

}
else{

icon.classList.remove("fa-sun");
icon.classList.add("fa-moon");

localStorage.setItem(
"theme",
"light"
);

}

}

/* LOAD THEME */

if(localStorage.getItem("theme") === "dark"){

document.body.classList.add("dark");

let icon =
document.querySelector(".dark-btn i");

icon.classList.remove("fa-moon");
icon.classList.add("fa-sun");

}

/* LANGUAGE */

function changeLanguage(){

let lang =
document.getElementById("languageSwitcher").value;

/* FRENCH */

if(lang === "fr"){

document.documentElement.lang = "fr";

document.getElementById("logoTitle").innerText =
"Marché Agricole RW-Rulindo";

document.getElementById("logoDesc").innerText =
"Bienvenue au marché agricole";

document.getElementById("navHome").innerText =
"Accueil";

document.getElementById("navLogin").innerText =
"Connexion";

document.getElementById("navSignup").innerText =
"Inscription";

document.getElementById("navShop").innerText =
"Boutique";

document.getElementById("navServices").innerText =
"Services";

document.getElementById("navOrders").innerText =
"Commandes";

document.getElementById("navContact").innerText =
"Contact";

}

/* KINYARWANDA */

else if(lang === "rw"){

document.documentElement.lang = "rw";

document.getElementById("logoTitle").innerText =
"Isoko Ry'Ubuhinzi RW-Rulindo";

document.getElementById("logoDesc").innerText =
"Murakaza neza";

document.getElementById("navHome").innerText =
"Ahabanza";

document.getElementById("navLogin").innerText =
"Kwinjira";

document.getElementById("navSignup").innerText =
"Kwiyandikisha";

document.getElementById("navShop").innerText =
"Iduka";

document.getElementById("navServices").innerText =
"Serivisi";

document.getElementById("navOrders").innerText =
"Commande";

document.getElementById("navContact").innerText =
"Twandikire";

}

/* ENGLISH */

else{

document.documentElement.lang = "en";

document.getElementById("logoTitle").innerText =
"RW-Rulindo Agro Market";

document.getElementById("logoDesc").innerText =
"Welcome to agricultural market";

document.getElementById("navHome").innerText =
"Home";

document.getElementById("navLogin").innerText =
"Login";

document.getElementById("navSignup").innerText =
"Sign Up";

document.getElementById("navShop").innerText =
"Shop";

document.getElementById("navServices").innerText =
"Services";

document.getElementById("navOrders").innerText =
"Orders";

document.getElementById("navContact").innerText =
"Contact";

}

}

/* SUBMIT */

function submitData(){

let name =
document.getElementById("name").value.trim();

let location =
document.getElementById("location").value.trim();

let bio =
document.getElementById("bio").value.trim();

/* VALIDATION */

if(
name === "" ||
location === "" ||
bio === ""
){

alert("❌ Please fill all fields");
return;

}

/* SAVE */

localStorage.setItem(
"farmerName",
name
);

localStorage.setItem(
"farmerLocation",
location
);

localStorage.setItem(
"farmerBio",
bio
);

/* SUCCESS */

alert("✅ Farmer registered successfully");

/* REDIRECT */

window.location.href =
"login2.html";

}

</script>

<!-- FOOTER -->
<footer>

<div class="footer-grid">

<div>

RW-Rulindo Agro Market
</h3>

<p>

</p>

<div>

<div class="social">

<i class="fa-brands fa-facebook-f"></i>
</a>

<a href="https://instagram.com">
<i class="fa-brands fa-instagram"></i>
</a>

</a>

</div>

</div>

</div>

<div style="text-align:center; margin-top:20px; font-size:14px; opacity:0.8;">

</div>

</footer>

</body>
</html>
